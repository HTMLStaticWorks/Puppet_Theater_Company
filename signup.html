<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <link rel="icon" type="image/png" href="assets/images/marionette-logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUPPET | Join the Troupe (Sign Up)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .auth-container {
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--puppet-bg-secondary) 0%, var(--puppet-bg-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Glassmorphism Auth Card */
        .auth-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3rem;
            transform: translateY(0);
            transition: all 0.5s var(--ease-puppet);
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            color: var(--puppet-text-light) !important;
        }

        .auth-card:hover {
            transform: translateY(-10px);
            border-color: var(--puppet-accent);
        }

        body[data-theme="light"] .auth-card {
            color: #0b0f14 !important;
        }

        .auth-card h2,
        .auth-card p,
        .auth-card span,
        .auth-card .form-label,
        .auth-card .social-btn,
        .auth-card a:not(.btn) {
            color: inherit !important;
            transition: all 0.3s ease;
        }

        .hover-warning:hover {
            color: var(--puppet-accent) !important;
            opacity: 1 !important;
        }

        .auth-card a.hover-warning:not(:has(img)):hover {
            text-decoration: underline !important;
        }

        /* Forms */
        .form-control-puppet {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: inherit;
            padding: 12px 18px;
            transition: all 0.3s ease;
        }

        .form-control-puppet:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--puppet-accent);
            box-shadow: none;
            color: inherit;
        }

        .auth-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--puppet-accent);
            opacity: 0.9;
        }

        .auth-logo {
            margin-bottom: 2rem;
            text-align: center;
        }

        .auth-logo a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-logo img {
            width: 50px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--puppet-text-muted);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        /* Social Buttons */
        .social-btn {
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: inherit;
            border-radius: 12px;
            padding: 12px 24px;
            width: 100%;
            display: grid;
            grid-template-columns: 20px 1fr 20px;
            align-items: center;
            text-align: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-bottom: 0.8rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .social-btn i {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.12) !important;
            border-color: var(--puppet-accent) !important;
            transform: translateY(-3px) scale(1.02);
            color: var(--puppet-accent) !important;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Fixed Theme Switch for Auth Pages */
        .theme-switch-wrapper {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        @media (max-width: 576px) {
            .theme-switch-wrapper {
                top: 1rem;
                right: 1rem;
            }

            .auth-card {
                padding: 2rem;
            }
        }
    </style>
</head>

<body class="loading">
    <div class="curtain-container">
        <div class="curtain-side curtain-left"></div>
        <div class="curtain-side curtain-right"></div>
    </div>

    <!-- Theme Switcher (Fixed) -->
    <div class="theme-switch-wrapper">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="theme-toggle">
            <label class="form-check-label small" for="theme-toggle">
                <i class="bi bi-moon-stars"></i>
            </label>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card reveal">
            <div class="auth-logo">
                <a href="index.html" class="hover-warning">
                    <img src="assets/images/marionette-logo.png" alt="Puppet Logo">
                    <span class="fs-4 fw-bold tracking-tight">PUPPET</span>
                </a>
            </div>

            <h2 class="h4 fw-bold text-center mb-4">Join the Troupe</h2>

            <a href="#" class="social-btn">
                <i class="bi bi-google text-danger"></i> <span>Continue with Google</span>
            </a>
            <a href="#" class="social-btn">
                <i class="bi bi-facebook text-primary"></i> <span>Continue with Facebook</span>
            </a>
            <a href="#" class="social-btn">
                <i class="bi bi-apple"></i> <span>Continue with Apple</span>
            </a>

            <div class="divider">OR SIGN UP WITH EMAIL</div>

            <form action="login.html">
                <div class="mb-3">
                    <label class="form-label auth-label">Full Name</label>
                    <input type="text" class="form-control form-control-puppet" placeholder="Arlo Thorne" required>
                </div>
                <div class="mb-3">
                    <label class="form-label auth-label">Email Address</label>
                    <input type="email" class="form-control form-control-puppet" placeholder="name@example.com"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label auth-label">Password</label>
                    <input type="password" class="form-control form-control-puppet" required>
                </div>
                <div class="mb-3">
                    <label class="form-label auth-label">Confirm Password</label>
                    <input type="password" class="form-control form-control-puppet" required>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small opacity-75" for="terms">
                        I agree to the <a href="#" class="text-warning text-decoration-none">Terms of Service</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-warning w-100 py-3 fw-bold rounded-pill mb-3 text-dark">
                    Create Account
                </button>
            </form>

            <p class="text-center small opacity-75 mb-0">
                Already have an account?
                <a href="login.html" class="text-warning text-decoration-none fw-bold hover-warning">Log In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
